version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pypocket-db
    environment:
      POSTGRES_DB: pypocket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pypocket"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pypocket-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: pypocket-api
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/pypocket
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=supersecretjwtkey123456!
      - COMPILER_SERVICE_URL=http://compiler:8001
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  compiler:
    build:
      context: .
      dockerfile: docker/compiler.Dockerfile
    container_name: pypocket-compiler
    ports:
      - "8001:8001"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=50m

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: pypocket-web
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  admin:
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
    container_name: pypocket-admin
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3001:3001"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
